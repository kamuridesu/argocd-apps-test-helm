enabled: true
image:
  repository: ghcr.io/kamuridesu/rainbot
version: "0.12.5"
replicas: 1
language: go
environment: prod
monitoring:
  datadog:
    enabled: true
envFrom:
  - secretRef:
      name: serviceless-rainbot-secret
env:
  - name: GOMAXPROCS
    value: "1"

readinessProbe:
  enabled: true
  probes:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5
livenessProbe:
  enabled: true
  probes:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 10

resources:
  limits:
    memory: 0.5G
  requests:
    cpu: 0.1
    memory: 0.3G

service:
  headless: false
