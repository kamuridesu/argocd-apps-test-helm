enabled: true
replicas: 1
version: 1.0.0
environment: prod
language: nodejs
image:
  repository: kamuri/quote-api

service:
  type: ClusterIP
  port: 3000

readinessProbe:
  enabled: true
  probes:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5
livenessProbe:
  enabled: true
  probes:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 10

resources:
  limits:
    cpu: 0.1
    memory: 200Mi
